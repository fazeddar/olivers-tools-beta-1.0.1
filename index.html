<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Olivers tools</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="particle-layer" aria-hidden="true">
        <span class="particle white"></span>
        <span class="particle purple"></span>
        <span class="particle white"></span>
        <span class="particle purple"></span>
        <span class="particle white"></span>
        <span class="particle purple"></span>
        <span class="particle white"></span>
        <span class="particle purple"></span>
        <span class="particle white"></span>
        <span class="particle purple"></span>
    </div>

    <aside class="side-menu" id="sideMenu" aria-label="Main menu">
        <h2 class="side-menu-title">Menu</h2>
        <button class="side-menu-button" id="settingsMenuBtn" type="button">Settings</button>
        <button class="side-menu-button" type="button">Support</button>
    </aside>

    <div class="app-shell">
        <header class="top-bar">
            <span class="top-bar-title">olivers tools</span>
            <button class="top-bar-open-blank" id="openBlankBtn" type="button">Open in about:blank</button>
        </header>

        <main class="app-main">
            <h1 class="tools-text">tools</h1>
            <h3 class="arch-text">ceasar your the goat <a href="https://1.bubbaincorp.workers.dev/" target="_blank">Bubba Inc</a> 
                im adding g@m3s when i make subdomains(dont forget to use about:blank pls)</h3>

            <section class="glass-panel">
                <div class="button-row">
                    <button class="outline-button" data-description="Artificial Intelligence">TuffTerminal</button>
                    <button class="outline-button" data-description="Web Console">WebConsole</button>
                    <button class="outline-button" data-description="Web pr0xy">pr0xy (buggy)</button>
                    <button class="outline-button" data-description="Button 4">4</button>
                </div>
                <div class="button-row">
                    <button class="outline-button" data-description="Button 5">5</button>
                    <button class="outline-button" data-description="Button 6">6</button>
                    <button class="outline-button" data-description="Button 7">7</button>
                    <button class="outline-button" data-description="Button 8">8</button>
                </div>
            </section>

            <section class="glass-panel transparent-panel">
            </section>
        </main>
    </div>

    <div class="tooltip-panel" id="tooltipPanel">
        <span class="tooltip-text" id="tooltipText"></span>
    </div>

    <div class="settings-overlay" id="settingsOverlay" aria-hidden="true">
        <div class="settings-panel" role="dialog" aria-modal="true" aria-labelledby="settingsPanelTitle">
            <button class="settings-close" id="settingsCloseBtn" type="button" aria-label="Close settings">Close</button>
            <div class="settings-view is-active" id="settingsMainView">
                <h2 class="settings-title" id="settingsPanelTitle">Settings</h2>
                <div class="settings-button-row">
                    <button class="settings-action-button" id="settingsOpenBlankBtn" type="button" data-description="Open this app inside about:blank">Open in about:blank</button>
                    <button class="settings-action-button" id="settingsAppearanceBtn" type="button" data-description="change this sites appearence">Appearance</button>
                    <button class="settings-action-button" id="settingsPrivacyBtn" type="button" data-description="View privacy options">Privacy</button>
                </div>
            </div>

            <div class="settings-view" id="appearanceView" aria-hidden="true">
                <div class="settings-view-header">
                    <button class="settings-back" id="appearanceBackBtn" type="button">Back</button>
                </div>
                <h2 class="settings-title">Appearance</h2>
                <p class="settings-view-text">coming soon...</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
